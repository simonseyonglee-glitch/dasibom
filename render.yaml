# Render.com Blueprint — 다시봄 자동 배포 설정 (무료 플랜)
# ⚠️ 무료 플랜은 영구 디스크 미지원 → SQLite는 임시 저장 (재시작 시 초기화)
# 데이터 영구 보존이 필요하면 Starter ($7/월) 플랜으로 변경 후 disk 섹션 추가
services:
  - type: web
    name: dasibom
    runtime: python
    plan: free
    region: singapore
    buildCommand: "pip install -r requirements.txt"
    startCommand: "uvicorn server:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
    healthCheckPath: /docs
